{% extends 'base.html' %}
{% block title %}Edit Profile – Traveloop{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-pencil me-2"></i>Edit Profile</h4>
    <a href="{{ url_for('profile.view') }}" class="btn btn-outline-secondary btn-sm">Cancel</a>
</div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">Update Your Details</div>
            <div class="card-body">
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name *</label>
                        <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Email *</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
