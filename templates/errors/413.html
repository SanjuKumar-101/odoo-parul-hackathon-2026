{% extends 'base.html' %}
{% block title %}File Too Large - Traveloop{% endblock %}
{% block content %}
<section class="empty-state page-empty">
    <span class="empty-icon"><i class="bi bi-cloud-arrow-up"></i></span>
    <h3>File is too large</h3>
    <p>Uploads are limited to 10 MB. Please choose a smaller image and try again.</p>
    <a href="{{ request.referrer or url_for('dashboard.index') }}" class="btn btn-primary">
        Try again
    </a>
</section>
{% endblock %}
