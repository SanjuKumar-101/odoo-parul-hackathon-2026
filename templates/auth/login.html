{% extends 'base.html' %}
{% block title %}Login – Traveloop{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-airplane-fill fs-1 text-primary"></i>
            <h3 class="fw-bold mt-2" style="color:#1e3a5f;">Traveloop</h3>
            <p class="text-muted small">Plan your journey, your way.</p>
        </div>
        <form method="POST" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Login</button>
        </form>
        <hr>
        <p class="text-center mb-0 small">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
