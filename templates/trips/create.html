{% extends 'base.html' %}
{% block title %}Create Trip – Traveloop{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-plus-circle me-2"></i>Plan a New Trip</h4>
    <a href="{{ url_for('trips.list_trips') }}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header">Trip Details</div>
            <div class="card-body">
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Trip Name *</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Europe Summer 2025" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Main Destination *</label>
                        <input type="text" name="destination" class="form-control"
                               placeholder="e.g. Paris, France" data-city-autocomplete required>
                        <small class="text-muted">Start typing to see available cities.</small>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Start Date *</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">End Date *</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Total Budget ($)</label>
                        <input type="number" name="total_budget" class="form-control" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="What's this trip about?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="bi bi-check-circle me-2"></i>Create Trip & Build Itinerary
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
